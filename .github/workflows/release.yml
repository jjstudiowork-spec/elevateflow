name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend deps
        run: npm install

      - name: Build universal Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ElevateFlow ${{ github.ref_name }}
          releaseBody: ${{ github.event.head_commit.message }}
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Rename DMG to simple name
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/dmg
          DMG=$(ls *.dmg | head -1)
          cp "$DMG" ElevateFlow.dmg

      - name: Upload renamed DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/universal-apple-darwin/release/bundle/dmg/ElevateFlow.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}